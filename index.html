<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚡</text></svg>">
    <title>Math Dash Pro</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #121a2b;
            --accent: #4cc9f0;
            --accent2: #22c55e;
            --danger: #ef4444;
            --text: #e6edf7;
            --glass: rgba(18, 26, 43, 0.85);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: all 0.2s ease;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #05070f);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* ===== ADAPTIVE GRID SYSTEM ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 25px;
        }

        .operations-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
        }

        .btn {
            all: unset;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 10px;
            border-radius: 24px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            box-shadow: 0 8px 20px -5px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            min-height: 85px;
        }

        .btn .emoji {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #1e293b;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.5);
        }

        .btn.active {
            background: var(--accent) !important;
            color: #050a18 !important;
            border: none;
        }

        .btn-wide {
            grid-column: span 2;
            flex-direction: row;
            gap: 15px;
            padding: 18px;
            background: linear-gradient(135deg, #4cc9f0, #3a86ff);
            color: #050a18;
            font-weight: 800;
            min-height: 65px;
        }

        /* ===== LAPTOP/DESKTOP OPTIMIZATION ===== */
        @media (min-width: 900px) {
            #app {
                max-width: 950px;
                padding: 40px;
            }

            .operations-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 18px;
            }

            .btn {
                min-height: 110px;
                font-size: 1rem;
            }

            .btn-wide {
                grid-column: span 2;
                flex-direction: row;
            }

            h1 {
                font-size: 3.5rem;
            }
        }

        /* UI SECTIONS */
        section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 110px;
        }

        .hidden {
            display: none !important;
        }

        .card-main {
            background: linear-gradient(180deg, #121a2b, #0c1424);
            border-radius: 35px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        #problem {
            font-size: 3.2rem;
            font-weight: 900;
            color: white;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        /* MCQ OPTIONS */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .opt-btn {
            background: #1e293b;
            border: 2px solid rgba(255, 255, 255, 0.05);
            color: white;
            padding: 20px;
            border-radius: 22px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-btn:active {
            background: var(--accent);
            color: #000;
            transform: scale(0.95);
        }

        input {
            width: 100%;
            max-width: 280px;
            padding: 15px;
            font-size: 2.5rem;
            border-radius: 20px;
            border: none;
            outline: none;
            text-align: center;
            background: #050a18;
            color: var(--accent);
            font-family: monospace;
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 500px;
            padding: 12px;
            border-radius: 30px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .app-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        @keyframes flash {
            0% {
                background: rgba(34, 197, 94, 0.3);
            }

            100% {
                background: transparent;
            }
        }

        .flash-correct {
            animation: flash 0.3s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 18px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>

                <h2>⚙️ Quiz Length</h2>

            </div>

            <h2>🎮 Operations</h2>
            <div class="operations-grid">

                <button class="btn" onclick="showSubMenu('add')"><span class="emoji">➕</span>Add</button>
                <button class="btn" onclick="showSubMenu('sub')"><span class="emoji">➖</span>Sub</button>
                <button class="btn" onclick="showSubMenu('mul')"><span class="emoji">✖️</span>Mul</button>

                <button class="btn btn-wide" onclick="showSubMenu('lcm')"><span class="emoji">📟</span>LCM</button>
                <button class="btn" onclick="showSubMenu('sq')"><span class="emoji">x²</span>Square</button>
                <button class="btn" onclick="showSubMenu('cb')"><span class="emoji">x³</span>Cube</button>
                <button class="btn" onclick="showSubMenu('sqrt')"><span class="emoji">√</span>Sq Root</button>

            </div>

        <section id="menu-sub" class="hidden">

            <div class="grid" id="digit-grid"></div>
            <div class="bottom-nav"><button class="btn btn-wide" onclick="toMain()">🏠 Back to Menu</button></div>

        <section id="game" class="hidden">
            <div style="display:flex; justify-content:space-between; width:100%; font-weight:800; margin-bottom:15px; color:var(--accent);">
                <span id="q-count">1/10</span>
                <span id="live-timer" style="font-family:monospace;">00:00:00</span>
            </div>
            <div class="card-main" id="game-card">
                <div id="problem">--</div>
                <div id="input-container">
                    <input type="tel" id="ans" inputmode="numeric" placeholder="?" autofocus>
                </div>
                <div id="options-container" class="options-container hidden">
                    <button class="opt-btn" id="optA" onclick="checkOption('optionA')"></button>
                    <button class="opt-btn" id="optB" onclick="checkOption('optionB')"></button>
                    <button class="opt-btn" id="optC" onclick="checkOption('optionC')"></button>
                    <button class="opt-btn" id="optD" onclick="checkOption('optionD')"></button>
                </div>
            </div>
            <div class="bottom-nav"><button class="btn" style="color:var(--danger); min-height:50px;" onclick="toMain()">🚩 Abandon</button></div>
        </section>

        <section id="result" class="hidden">
            <div class="card-main">
                <div id="res-mode-label" style="opacity:.5; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;">MODE</div>
                <div id="final-formatted" style="font-size:3.5rem; font-weight:900; color:var(--accent); margin:10px 0;">00:00:00</div>
                <div class="stats-row">
                    <span id="best-time" style="color:var(--accent2); font-weight:800;">🏆 --:--</span>
                    <span id="worst-time" style="color:var(--danger); font-weight:800;">🐢 --:--</span>
                </div>
            </div>
            <div style="background:var(--card); border-radius:25px; padding:15px; overflow:hidden;">
                <h3 style="margin:0 0 10px 0; font-size:0.9rem; text-align:center; opacity:0.7;">Recent Attempts</h3>
                <table id="history-table">
                    <tbody id="res-history-body"></tbody>
                </table>
            </div>
            <div class="bottom-nav">
                <div class="grid" style="margin-bottom:0">
                    <button class="btn" style="background:var(--accent); color:#000; min-height:60px;" onclick="restart()">⚡ Replay</button>
                    <button class="btn" style="min-height:60px;" onclick="toMain()">🏠 Menu</button>
                </div>
            </div>
        </section>

        <div id="popup" class="app-popup hidden">
            <div style="width:90%; max-width:450px; background:#1e293b; border-radius:30px; padding:25px; height:75vh; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#1e293b; padding-bottom:15px; z-index:10;">
                    <h2 id="popup-title" style="margin:0">Reference</h2>

            mode: '',

            timerInterval: null,
            answer: 0,
            running: false,
            activePool: [],
            correctOption: ''

        const _gcd = (a, b) => b === 0 ? a : _gcd(b, a % b);
        const _lcm = (a, b) => (a * b) / _gcd(a, b);

        function setLimit(num, el) {
            config.limit = num;
            document.querySelectorAll('.q-limit').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function showSubMenu(op) {
            config.mode = op;
            const grid = document.getElementById('digit-grid');
            document.getElementById('sub-title').innerText = op.toUpperCase();
            let html = '';

            if (op === 'lcm' || op === 'hcf') {
                html = `<button class="btn" onclick="startGame('${op}','2n2d')">2 Nos (2-Dig)</button>
                        <button class="btn" onclick="startGame('${op}','3n2d')">3 Nos (2-Dig)</button>
                        <button class="btn btn-wide" onclick="startGame('${op}','2n3d')">🥇 2 Nos (3-Dig)</button>`;
            } else if (op === 'sq' || op === 'sqrt') {
                html = `<button class="btn" onclick="startGame('${op}','2-30')">2 - 30</button>
                        <button class="btn" onclick="startGame('${op}','2-100')">2 - 100</button>
                        <button class="btn btn-wide" onclick="startGame('${op}','2-200')">🥇 Expert 200</button>`;
            } else if (op === 'cb' || op === 'cbrt') {
                html = `<button class="btn" onclick="startGame('${op}','2-15')">2 - 15</button>
                        <button class="btn" onclick="startGame('${op}','2-30')">2 - 30</button>
                        <button class="btn btn-wide" onclick="startGame('${op}','2-50')">🥇 Expert 50</button>`;
            } else {
                html = `<button class="btn" onclick="startGame('${op}','2x2')">2x2 Digits</button>
                        <button class="btn" onclick="startGame('${op}','2x3')">2x3 Digits</button>
                        <button class="btn btn-wide" onclick="startGame('${op}','3x3')">🥇 Expert 3x3</button>`;
            }

            grid.innerHTML = html;
            document.getElementById('menu-main').classList.add('hidden');
            document.getElementById('menu-sub').classList.remove('hidden');
        }

        function startGame(op, digits) {
            config.mode = op;
            config.digits = digits;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('game').classList.remove('hidden');

            if (op === 'pct') {
                document.getElementById('input-container').classList.add('hidden');
                document.getElementById('options-container').classList.remove('hidden');
                game.activePool = [...pctQuestions].sort(() => 0.5 - Math.random());
            } else {
                document.getElementById('input-container').classList.remove('hidden');
                document.getElementById('options-container').classList.add('hidden');
            }

            const overlay = document.getElementById('countdown-overlay');
            const countEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            let count = 3;
            countEl.innerText = count;

            const cd = setInterval(() => {
                count--;
                if (count > 0) countEl.innerText = count;
                else if (count === 0) countEl.innerText = "GO!";
                else {
                    clearInterval(cd);
                    overlay.classList.add('hidden');
                    game.current = 1;
                    game.startTime = Date.now();
                    game.running = true;
                    game.timerInterval = setInterval(() => {
                        document.getElementById('live-timer').innerText = formatTime(Date.now() - game.startTime);
                    }, 50);
                    nextQuestion();
                }
            }, 700);
        }

        function nextQuestion() {
            document.getElementById('q-count').innerText = `${game.current}/${config.limit}`;
            const probEl = document.getElementById('problem');
            let op = config.mode,
                d = config.digits;

            if (op === 'pct') {
                const q = game.activePool[game.current - 1];
                probEl.innerText = q.question;
                document.getElementById('optA').innerText = q.optionA;
                document.getElementById('optB').innerText = q.optionB;
                document.getElementById('optC').innerText = q.optionC;
                document.getElementById('optD').innerText = q.optionD;
                game.correctOption = q.correctOption;
            } else {
                let n1, n2, n3;
                if (op === 'lcm' || op === 'hcf') {
                    const is3Num = d.includes('3n'),
                        is3Dig = d.includes('3d'),
                        com = rand(2, 12);
                    n1 = rand(is3Dig ? 10 : 2, 25) * com;
                    n2 = rand(is3Dig ? 10 : 2, 25) * com;
                    n3 = is3Num ? rand(is3Dig ? 10 : 2, 25) * com : null;
                    if (op === 'hcf') {
                        game.answer = is3Num ? _gcd(n1, _gcd(n2, n3)) : _gcd(n1, n2);
                        probEl.innerText = is3Num ? `HCF(${n1},${n2},${n3})` : `HCF(${n1},${n2})`;
                    } else {
                        game.answer = is3Num ? _lcm(n1, _lcm(n2, n3)) : _lcm(n1, n2);
                        probEl.innerText = is3Num ? `LCM(${n1},${n2},${n3})` : `LCM(${n1},${n2})`;
                    }
                } else if (op === 'sq' || op === 'sqrt') {
                    let n = rand(2, d.includes('200') ? 200 : d.includes('100') ? 100 : 30);
                    if (op === 'sq') {
                        game.answer = n * n;
                        probEl.innerText = `${n}²`;
                    } else {
                        game.answer = n;
                        probEl.innerText = `√${n*n}`;
                    }
                } else if (op === 'cb' || op === 'cbrt') {
                    let n = rand(2, d.includes('50') ? 50 : d.includes('30') ? 30 : 15);
                    if (op === 'cb') {
                        game.answer = n * n * n;
                        probEl.innerText = `${n}³`;
                    } else {
                        game.answer = n;
                        probEl.innerText = `∛${n*n*n}`;
                    }
                } else {
                    n1 = d.includes('3x') ? rand(100, 999) : rand(10, 99);
                    n2 = d.includes('x3') ? rand(100, 999) : rand(10, 99);
                    if (op === 'add') {
                        game.answer = n1 + n2;
                        probEl.innerText = `${n1}+${n2}`;
                    } else if (op === 'sub') {
                        if (n1 < n2)[n1, n2] = [n2, n1];
                        game.answer = n1 - n2;
                        probEl.innerText = `${n1}-${n2}`;
                    } else if (op === 'mul') {
                        game.answer = n1 * n2;
                        probEl.innerText = `${n1}×${n2}`;
                    } else {
                        game.answer = n1;
                        probEl.innerText = `${n1*n2}÷${n2}`;
                    }
                }
                document.getElementById('ans').value = '';
                setTimeout(() => document.getElementById('ans').focus(), 50);
            }
        }

        function checkOption(choice) {
            if (!game.running) return;
            if (choice === game.correctOption) handleCorrect();
        }

        function checkAnswer() {
            if (!game.running) return;
            if (parseInt(document.getElementById('ans').value) === game.answer) handleCorrect();
        }

        function handleCorrect() {
            const card = document.getElementById('game-card');
            card.classList.add('flash-correct');
            setTimeout(() => card.classList.remove('flash-correct'), 250);
            if (game.current < config.limit) {
                game.current++;
                nextQuestion();
            } else {
                finish();
            }
        }

        function finish() {
            game.running = false;
            clearInterval(game.timerInterval);
            const timeTaken = Date.now() - game.startTime;
            const key = `stats_${config.mode}_${config.digits}_${config.limit}`;

            let history = JSON.parse(localStorage.getItem(key) || "[]");
            history.unshift(timeTaken);
            if (history.length > 5) history.pop();
            localStorage.setItem(key, JSON.stringify(history));

            let sorted = [...history].sort((a, b) => a - b);

            document.getElementById('game').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-formatted').innerText = formatTime(timeTaken);
            document.getElementById('res-mode-label').innerText = `${config.mode} (${config.digits})`;
            document.getElementById('best-time').innerText = `🏆 ${formatTime(sorted[0])}`;
            document.getElementById('worst-time').innerText = `🐢 ${formatTime(sorted[sorted.length-1])}`;

            document.getElementById('res-history-body').innerHTML = history.map((h, i) => `
                <tr><td style="opacity:0.6">Attempt ${history.length - i}</td><td style="text-align:right; font-weight:800; font-family:monospace;">${formatTime(h)}</td></tr>`).join('');
        }

        function toMain() {
            clearInterval(game.timerInterval);
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('menu-main').classList.remove('hidden');
        }

        function restart() {
            startGame(config.mode, config.digits);
        }

        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        function formatTime(ms) {
            let m = Math.floor(ms / 60000),
                s = Math.floor((ms % 60000) / 1000),
                cs = Math.floor((ms % 1000) / 10);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${cs.toString().padStart(2,'0')}`;
        }

        function openLearn(type) {
            const table = document.getElementById('learn-table-body');
            let html = '';
            if (type === 'square') {
                for (let i = 2; i <= 30; i++) html += `<tr><td>${i}²</td><td style="text-align:right"><b>${i*i}</b></td></tr>`;
            } else if (type === 'cube') {
                for (let i = 2; i <= 20; i++) html += `<tr><td>${i}³</td><td style="text-align:right"><b>${i*i*i}</b></td></tr>`;
            } else if (type === 'table') {
                for (let i = 2; i <= 15; i++) {
                    html += `<tr><td colspan="2" style="background:rgba(255,255,255,0.05); padding:10px; font-weight:bold; border-radius:10px">Table of ${i}</td></tr>`;
                    for (let j = 1; j <= 10; j++) html += `<tr><td>${i}×${j}</td><td style="text-align:right">${i*j}</td></tr>`;
                }
            }
            table.innerHTML = html;
            document.getElementById('popup').classList.remove('hidden');
        }

        function closeLearn() {
            document.getElementById('popup').classList.add('hidden');
        }
        document.getElementById('ans').addEventListener('input', checkAnswer);
    </script>
</body>
