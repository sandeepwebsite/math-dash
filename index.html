<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚡</text></svg>">
    <title>Math Dash</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #121a2b;
            --accent: #4cc9f0;
            --accent2: #22c55e;
            --danger: #ef4444;
            --text: #e6edf7;
            --glass: rgba(18, 26, 43, 0.85);
        }

        /* ===== BASE STYLES ===== */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #05070f);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== RESPONSIVE LAYOUT (Tablet/Laptop) ===== */
        @media (min-width: 768px) {
            #app {
                max-width: 1200px;
                padding: 40px;
            }

            h1 {
                font-size: 3.5rem !important;
                margin-bottom: 50px !important;
            }

            .center-section {
                max-width: 700px;
                margin: 0 auto;
                width: 100%;
            }

            .operations-grid {
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 20px;
            }

            .card-main {
                padding: 60px 40px !important;
                max-width: 600px;
                margin: 0 auto 30px auto !important;
            }

            #problem {
                font-size: 5rem !important;
            }

            .bottom-nav {
                max-width: 600px;
                left: 50% !important;
                transform: translateX(-50%);
            }
        }

        /* ===== HEADINGS ===== */
        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin: 10px 0;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0.8;
            margin: 35px 0 15px 5px;
            text-align: center;
        }

        /* ===== PREMIUM BUTTONS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .btn {
            all: unset;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 12px;
            border-radius: 28px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        .btn .emoji {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
        }

        .btn:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, #25334d, #121d33);
        }

        .btn.active {
            background: var(--accent) !important;
            color: #050a18 !important;
            box-shadow: 0 0 25px rgba(76, 201, 240, 0.5) !important;
            transform: scale(1.02);
        }

        .btn-feature {
            grid-column: span 2;
            flex-direction: row;
            gap: 16px;
            padding: 22px;
            background: linear-gradient(135deg, #4cc9f0, #3a86ff);
            color: #050a18;
            font-weight: 800;
        }

        @media (min-width: 768px) {
            .btn-feature {
                grid-column: span 2;
            }

            .operations-grid .btn-feature {
                grid-column: span 4;
            }
        }

        /* ===== UI SECTIONS ===== */
        section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 140px;
        }

        .hidden {
            display: none !important;
        }

        /* ===== RESULT CONTENT - FORCED COLUMN ALL DEVICES ===== */
        #result-content {
            display: flex !important;
            flex-direction: column !important;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .card-main {
            background: linear-gradient(180deg, #121a2b, #0c1424);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        #problem {
            font-size: 3.8rem;
            font-weight: 900;
            margin-bottom: 25px;
            color: white;
            letter-spacing: -2px;
        }

        input {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 2.5rem;
            border-radius: 24px;
            border: none;
            outline: none;
            text-align: center;
            background: #050a18;
            color: var(--accent);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            padding: 15px;
            border-radius: 35px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .quit-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ff8e8e;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 18px;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }

        .app-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        @keyframes flash {
            0% {
                background: rgba(34, 197, 94, 0.3);
            }

            100% {
                background: transparent;
            }
        }

        .flash-correct {
            animation: flash 0.3s ease-out;
        }
    </style>
</head>

<body>
    <div id="app">
        <section id="menu-main">
            <h1>Math Dash ⚡</h1>
            <div class="center-section">
                <h2>📚 Learn Hub</h2>
                <div class="grid">
                    <button class="btn" onclick="openLearn('square')"><span class="emoji">x²</span>Squares</button>
                    <button class="btn" onclick="openLearn('cube')"><span class="emoji">x³</span>Cubes</button>
                    <button class="btn btn-feature" onclick="openLearn('table')"><span class="emoji">✖️</span>Master Tables</button>
                </div>
                <h2>⚙️ Quiz Length</h2>
                <div class="grid quiz-length">
                    <button class="btn q-limit active" onclick="setLimit(10,this)">10 Q</button>
                    <button class="btn q-limit" onclick="setLimit(20,this)">20 Q</button>
                </div>
            </div>
            <h2>🎮 Operations</h2>
            <div class="grid operations-grid">
                <button class="btn" onclick="showSubMenu('add')"><span class="emoji">➕</span>Add</button>
                <button class="btn" onclick="showSubMenu('sub')"><span class="emoji">➖</span>Sub</button>
                <button class="btn" onclick="showSubMenu('mul')"><span class="emoji">✖️</span>Mul</button>
                <button class="btn" onclick="showSubMenu('div')"><span class="emoji">➗</span>Div</button>
                <button class="btn" onclick="showSubMenu('sq')"><span class="emoji">x²</span>Square</button>
                <button class="btn" onclick="showSubMenu('cb')"><span class="emoji">x³</span>Cube</button>
                <button class="btn" onclick="showSubMenu('sqrt')"><span class="emoji">√</span>Sq Root</button>
                <button class="btn" onclick="showSubMenu('cbrt')"><span class="emoji">∛</span>Cube Root</button>
            </div>
        </section>

        <section id="menu-sub" class="hidden">
            <h1 id="sub-title">Difficulty</h1>
            <div class="grid center-section" id="digit-grid"></div>
            <div class="bottom-nav"><button class="btn btn-feature" onclick="toMain()">🏠 Back to Menu</button></div>
        </section>

        <section id="game" class="hidden">
            <div style="display:flex; justify-content:space-between; margin: 0 auto 20px; width:100%; max-width:600px; font-weight:800;">
                <span id="q-count" style="color:var(--accent); font-size:1.2rem;">1/10</span>
                <span id="live-timer" style="font-family:monospace; font-size:1.4rem; color:var(--text);">00:00:00</span>
            </div>
            <div class="card-main" id="game-card">
                <div id="problem">--</div>
                <input type="tel" id="ans" inputmode="numeric" placeholder="?" autofocus>
            </div>
            <div class="bottom-nav"><button class="quit-btn" onclick="toMain()">🚩 Abandon Quiz</button></div>
        </section>

        <section id="result" class="hidden">
            <div id="result-content">
                <div class="card-main">
                    <div id="res-mode-label" style="opacity:.5; font-size:0.8rem; letter-spacing:1px; margin-bottom:10px;">MODE</div>
                    <div id="final-formatted" style="font-size:3.5rem; font-weight:900; color:var(--accent); margin:15px 0;">00:00:00</div>
                    <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:15px; border-radius:22px;">
                        <span id="best-time" style="color:var(--accent2); font-weight:800; font-size:1rem;">🏆 --:--</span>
                        <span id="worst-time" style="color:var(--danger); font-weight:800; font-size:1rem;">🐢 --:--</span>
                    </div>
                </div>
                <div style="background: var(--card); border-radius:30px; padding:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                    <h2 style="margin-top:0; text-align: center;">Recent History</h2>
                    <table style="width:100%; border-collapse:collapse;">
                        <tbody id="res-history-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="grid" style="margin-bottom:0; grid-template-columns: 1fr 1fr !important;">
                    <button class="btn" style="background:var(--accent); color:#000" onclick="restart()">⚡ Again</button>
                    <button class="btn" onclick="toMain()">🏠 Menu</button>
                </div>
            </div>
        </section>

        <div id="popup" class="app-popup hidden">
            <div style="width:90%; max-width:500px; background:#1e293b; border-radius:35px; padding:30px; height:80vh; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 id="popup-title" style="margin:0">Reference</h2>
                    <button onclick="closeLearn()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">✕</button>
                </div>
                <table style="width:100%; margin-top:25px; border-collapse:collapse; font-size:1.1rem;" id="learn-table-body"></table>
            </div>
        </div>
        <div id="countdown-overlay" class="app-popup hidden">
            <div id="countdown-text" style="font-size:10rem; font-weight:900; color:var(--accent);">3</div>
        </div>
    </div>

    <script>
        let config = {
            limit: 10,
            mode: '',
            digits: ''
        };
        let game = {
            current: 0,
            startTime: 0,
            timerInterval: null,
            answer: 0,
            running: false
        };

        function setLimit(num, el) {
            config.limit = num;
            document.querySelectorAll('.q-limit').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function showSubMenu(op) {
            config.mode = op;
            const grid = document.getElementById('digit-grid');
            const icons = {
                add: '➕',
                sub: '➖',
                mul: '✖️',
                div: '➗',
                sq: '²',
                cb: '³',
                sqrt: '√',
                cbrt: '∛'
            };
            const icon = icons[op];
            document.getElementById('sub-title').innerText = op.toUpperCase();
            let html = '';
            if (op === 'div') {
                html = `<button class="btn" onclick="startGame('div','1-12')"><span class="emoji">🔢</span><span>1-12 Table</span></button>
                        <button class="btn" onclick="startGame('div','Mixed')"><span class="emoji">🌀</span><span>Mixed Div</span></button>`;
            } else if (op === 'sq' || op === 'sqrt') {
                html = `<button class="btn" onclick="startGame('${op}','2-30')"><span class="emoji">${icon}</span><span>2 - 30</span></button>
                        <button class="btn" onclick="startGame('${op}','2-100')"><span class="emoji">${icon}</span><span>2 - 100</span></button>
                        <button class="btn btn-feature" onclick="startGame('${op}','2-200')"><span class="emoji">🥇</span><span>Expert 200</span></button>`;
            } else if (op === 'cb' || op === 'cbrt') {
                html = `<button class="btn" onclick="startGame('${op}','2-15')"><span class="emoji">${icon}</span><span>2 - 15</span></button>
                        <button class="btn" onclick="startGame('${op}','2-30')"><span class="emoji">${icon}</span><span>2 - 30</span></button>
                        <button class="btn btn-feature" onclick="startGame('${op}','2-50')"><span class="emoji">🥇</span><span>Expert 50</span></button>`;
            } else {
                html = `<button class="btn" onclick="startGame('${op}','2x2')"><span class="emoji">${icon}</span><span>2 x 2</span></button>
                        <button class="btn" onclick="startGame('${op}','2x3')"><span class="emoji">${icon}</span><span>2 x 3</span></button>
                        <button class="btn btn-feature" onclick="startGame('${op}','3x3')"><span class="emoji">🥇</span><span>Expert 3 x 3</span></button>`;
            }
            grid.innerHTML = html;
            document.getElementById('menu-main').classList.add('hidden');
            document.getElementById('menu-sub').classList.remove('hidden');
        }

        function startGame(op, digits) {
            config.mode = op;
            config.digits = digits;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('game').classList.remove('hidden');
            const overlay = document.getElementById('countdown-overlay');
            const countEl = document.getElementById('countdown-text');
            overlay.classList.remove('hidden');
            let count = 3;
            countEl.innerText = count;
            const cd = setInterval(() => {
                count--;
                if (count > 0) countEl.innerText = count;
                else if (count === 0) {
                    countEl.innerText = "GO!";
                    countEl.style.color = "var(--accent2)";
                } else {
                    clearInterval(cd);
                    overlay.classList.add('hidden');
                    countEl.style.color = "var(--accent)";
                    game.current = 1;
                    game.startTime = Date.now();
                    game.running = true;
                    game.timerInterval = setInterval(() => {
                        document.getElementById('live-timer').innerText = formatTime(Date.now() - game.startTime);
                    }, 50);
                    nextQuestion();
                }
            }, 800);
        }

        function nextQuestion() {
            document.getElementById('q-count').innerText = `${game.current}/${config.limit}`;
            const input = document.getElementById('ans');
            let n, n1, n2, d = config.digits,
                op = config.mode,
                probTxt = '';
            if (op === 'sq') {
                n = rand(2, d === '2-30' ? 30 : d === '2-100' ? 100 : 200);
                game.answer = n * n;
                probTxt = `${n}²`;
            } else if (op === 'cb') {
                n = rand(2, d === '2-15' ? 15 : d === '2-30' ? 30 : 50);
                game.answer = n * n * n;
                probTxt = `${n}³`;
            } else if (op === 'sqrt') {
                game.answer = rand(2, d === '2-30' ? 30 : d === '2-100' ? 100 : 200);
                n = game.answer * game.answer;
                probTxt = `√${n}`;
            } else if (op === 'cbrt') {
                game.answer = rand(2, d === '2-15' ? 15 : d === '2-30' ? 30 : 50);
                n = game.answer * game.answer * game.answer;
                probTxt = `∛${n}`;
            } else if (op === 'div') {
                n2 = d === '1-12' ? rand(2, 12) : rand(2, 25);
                game.answer = d === '1-12' ? rand(2, 12) : rand(2, 50);
                n1 = n2 * game.answer;
                probTxt = `${n1} ÷ ${n2}`;
            } else {
                n1 = d === '2x2' ? rand(10, 99) : d === '2x3' ? rand(10, 99) : rand(100, 999);
                n2 = d === '2x2' ? rand(10, 99) : d === '2x3' ? rand(100, 999) : rand(100, 999);
                if (op === 'add') {
                    game.answer = n1 + n2;
                    probTxt = `${n1}+${n2}`;
                } else if (op === 'sub') {
                    if (n1 < n2)[n1, n2] = [n2, n1];
                    game.answer = n1 - n2;
                    probTxt = `${n1}-${n2}`;
                } else {
                    game.answer = n1 * n2;
                    probTxt = `${n1}×${n2}`;
                }
            }
            document.getElementById('problem').innerText = probTxt;
            input.value = '';
            setTimeout(() => input.focus(), 50);
        }

        function checkAnswer() {
            if (!game.running) return;
            if (parseInt(document.getElementById('ans').value) === game.answer) {
                const card = document.getElementById('game-card');
                card.classList.add('flash-correct');
                setTimeout(() => card.classList.remove('flash-correct'), 300);
                if (game.current < config.limit) {
                    game.current++;
                    nextQuestion();
                } else {
                    finish();
                }
            }
        }

        function finish() {
            game.running = false;
            clearInterval(game.timerInterval);
            const ms = Date.now() - game.startTime;
            const key = `stats_${config.mode}_${config.digits}_${config.limit}`;
            let history = JSON.parse(localStorage.getItem(key) || "[]");
            history.unshift(ms);
            if (history.length > 5) history.pop();
            localStorage.setItem(key, JSON.stringify(history));
            let sorted = [...history].sort((a, b) => a - b);
            document.getElementById('game').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-formatted').innerText = formatTime(ms);
            document.getElementById('res-mode-label').innerText = `${config.mode.toUpperCase()} - ${config.digits} (${config.limit}Q)`;
            document.getElementById('best-time').innerText = `🏆 ${formatTime(sorted[0])}`;
            document.getElementById('worst-time').innerText = `🐢 ${formatTime(sorted[sorted.length-1])}`;
            document.getElementById('res-history-body').innerHTML = history.map((h, i) => `
                <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
                    <td style="padding:18px; opacity:0.5; font-size:0.9rem;">Attempt ${history.length - i}</td>
                    <td style="text-align:right; font-weight:800; font-family:monospace; font-size:1rem;">${formatTime(h)}</td>
                </tr>`).join('');
        }

        function toMain() {
            clearInterval(game.timerInterval);
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('menu-main').classList.remove('hidden');
        }

        function restart() {
            startGame(config.mode, config.digits);
        }

        function rand(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        function formatTime(ms) {
            let m = Math.floor(ms / 60000),
                s = Math.floor((ms % 60000) / 1000),
                cs = Math.floor((ms % 1000) / 10);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}:${cs.toString().padStart(2,'0')}`;
        }

        function openLearn(type) {
            const table = document.getElementById('learn-table-body');
            let html = '';
            if (type === 'square') {
                for (let i = 2; i <= 30; i++) html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.1)"><td style="padding:12px">${i}²</td><td style="text-align:right; font-weight:800">${i*i}</td></tr>`;
            } else if (type === 'cube') {
                for (let i = 2; i <= 20; i++) html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.1)"><td style="padding:12px">${i}³</td><td style="text-align:right; font-weight:800">${i*i*i}</td></tr>`;
            } else if (type === 'table') {
                for (let i = 2; i <= 15; i++) {
                    html += `<tr><td colspan="2" style="background:rgba(255,255,255,0.1); padding:10px; font-weight:bold; border-radius:12px">Table of ${i}</td></tr>`;
                    for (let j = 1; j <= 10; j++) html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)"><td style="padding:8px">${i} × ${j}</td><td style="text-align:right">${i*j}</td></tr>`;
                }
            }
            table.innerHTML = html;
            document.getElementById('popup').classList.remove('hidden');
        }

        function closeLearn() {
            document.getElementById('popup').classList.add('hidden');
        }
        document.getElementById('ans').addEventListener('input', checkAnswer);
    </script>
</body>

</html>
